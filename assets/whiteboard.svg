<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300">
  <!-- App shell -->
  <rect width="500" height="300" rx="6" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="500" height="36" rx="6" fill="#2a2a3e"/>
  <rect y="30" width="500" height="6" fill="#2a2a3e"/>
  <circle cx="16" cy="18" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="18" r="5" fill="#febc2e"/>
  <circle cx="52" cy="18" r="5" fill="#28c840"/>
  <text x="250" y="23" font-family="monospace" font-size="11" fill="#9090aa" text-anchor="middle">Collaborative Whiteboard</text>

  <!-- Canvas area -->
  <rect x="0" y="36" width="500" height="264" fill="#f8f9fc"/>

  <!-- Toolbar -->
  <rect x="0" y="36" width="44" height="264" fill="#252535"/>
  <!-- Pencil icon -->
  <rect x="10" y="50" width="24" height="24" rx="4" fill="#3a3a54"/>
  <line x1="18" y1="67" x2="28" y2="57" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
  <line x1="17" y1="68" x2="21" y2="68" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Shape icon -->
  <rect x="10" y="82" width="24" height="24" rx="4" fill="#3a3a54"/>
  <rect x="15" y="87" width="14" height="14" rx="2" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <!-- Text icon -->
  <rect x="10" y="114" width="24" height="24" rx="4" fill="#2a2a3e"/>
  <text x="22" y="130" font-family="serif" font-size="13" fill="#94a3b8" text-anchor="middle" font-weight="bold">T</text>
  <!-- Eraser icon -->
  <rect x="10" y="146" width="24" height="24" rx="4" fill="#2a2a3e"/>
  <rect x="13" y="154" width="18" height="10" rx="2" fill="none" stroke="#f472b6" stroke-width="1.5"/>
  <!-- Color swatches -->
  <circle cx="22" cy="198" r="6" fill="#a78bfa"/>
  <circle cx="22" cy="218" r="6" fill="#60a5fa"/>
  <circle cx="22" cy="238" r="6" fill="#34d399"/>
  <circle cx="22" cy="258" r="6" fill="#f87171"/>

  <!-- Grid dots -->
  <g fill="#dde1ed" opacity="0.6">
    <circle cx="80" cy="70" r="1"/><circle cx="120" cy="70" r="1"/><circle cx="160" cy="70" r="1"/><circle cx="200" cy="70" r="1"/><circle cx="240" cy="70" r="1"/><circle cx="280" cy="70" r="1"/><circle cx="320" cy="70" r="1"/><circle cx="360" cy="70" r="1"/><circle cx="400" cy="70" r="1"/><circle cx="440" cy="70" r="1"/><circle cx="480" cy="70" r="1"/>
    <circle cx="80" cy="110" r="1"/><circle cx="120" cy="110" r="1"/><circle cx="160" cy="110" r="1"/><circle cx="200" cy="110" r="1"/><circle cx="240" cy="110" r="1"/><circle cx="280" cy="110" r="1"/><circle cx="320" cy="110" r="1"/><circle cx="360" cy="110" r="1"/><circle cx="400" cy="110" r="1"/><circle cx="440" cy="110" r="1"/><circle cx="480" cy="110" r="1"/>
    <circle cx="80" cy="150" r="1"/><circle cx="120" cy="150" r="1"/><circle cx="160" cy="150" r="1"/><circle cx="200" cy="150" r="1"/><circle cx="240" cy="150" r="1"/><circle cx="280" cy="150" r="1"/><circle cx="320" cy="150" r="1"/><circle cx="360" cy="150" r="1"/><circle cx="400" cy="150" r="1"/><circle cx="440" cy="150" r="1"/><circle cx="480" cy="150" r="1"/>
    <circle cx="80" cy="190" r="1"/><circle cx="120" cy="190" r="1"/><circle cx="160" cy="190" r="1"/><circle cx="200" cy="190" r="1"/><circle cx="240" cy="190" r="1"/><circle cx="280" cy="190" r="1"/><circle cx="320" cy="190" r="1"/><circle cx="360" cy="190" r="1"/><circle cx="400" cy="190" r="1"/><circle cx="440" cy="190" r="1"/><circle cx="480" cy="190" r="1"/>
    <circle cx="80" cy="230" r="1"/><circle cx="120" cy="230" r="1"/><circle cx="160" cy="230" r="1"/><circle cx="200" cy="230" r="1"/><circle cx="240" cy="230" r="1"/><circle cx="280" cy="230" r="1"/><circle cx="320" cy="230" r="1"/><circle cx="360" cy="230" r="1"/><circle cx="400" cy="230" r="1"/><circle cx="440" cy="230" r="1"/><circle cx="480" cy="230" r="1"/>
    <circle cx="80" cy="270" r="1"/><circle cx="120" cy="270" r="1"/><circle cx="160" cy="270" r="1"/><circle cx="200" cy="270" r="1"/><circle cx="240" cy="270" r="1"/><circle cx="280" cy="270" r="1"/><circle cx="320" cy="270" r="1"/><circle cx="360" cy="270" r="1"/><circle cx="400" cy="270" r="1"/><circle cx="440" cy="270" r="1"/><circle cx="480" cy="270" r="1"/>
  </g>

  <!-- Purple freehand stroke -->
  <path d="M80 160 Q100 130 130 145 Q155 160 170 140 Q185 120 210 135" stroke="#a78bfa" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Blue rectangle -->
  <rect x="250" y="80" width="100" height="65" rx="4" fill="none" stroke="#60a5fa" stroke-width="2"/>
  <text x="300" y="117" font-family="sans-serif" font-size="10" fill="#60a5fa" text-anchor="middle">Component</text>

  <!-- Green arrow -->
  <line x1="220" y1="112" x2="248" y2="112" stroke="#34d399" stroke-width="2" stroke-linecap="round"/>
  <polygon points="248,108 256,112 248,116" fill="#34d399"/>

  <!-- Pink freehand scribble -->
  <path d="M360 180 Q380 160 400 175 Q420 190 440 165 Q455 150 470 170" stroke="#f472b6" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Sticky note -->
  <rect x="80" y="195" width="90" height="65" rx="2" fill="#fef08a" opacity="0.9"/>
  <text x="88" y="213" font-family="sans-serif" font-size="8" fill="#713f12">socket.io events:</text>
  <text x="88" y="227" font-family="monospace" font-size="7.5" fill="#92400e">draw</text>
  <text x="88" y="240" font-family="monospace" font-size="7.5" fill="#92400e">cursor-move</text>
  <text x="88" y="253" font-family="monospace" font-size="7.5" fill="#92400e">clear-canvas</text>

  <!-- User cursors -->
  <g transform="translate(210,130)">
    <polygon points="0,0 0,16 4,12 7,19 9,18 6,11 11,11" fill="#a78bfa" stroke="white" stroke-width="0.8"/>
    <rect x="13" y="8" width="38" height="14" rx="3" fill="#a78bfa"/>
    <text x="32" y="19" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle">Hemant</text>
  </g>

  <g transform="translate(355,68)">
    <polygon points="0,0 0,16 4,12 7,19 9,18 6,11 11,11" fill="#60a5fa" stroke="white" stroke-width="0.8"/>
    <rect x="13" y="8" width="30" height="14" rx="3" fill="#60a5fa"/>
    <text x="28" y="19" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle">User 2</text>
  </g>

  <g transform="translate(440,155)">
    <polygon points="0,0 0,16 4,12 7,19 9,18 6,11 11,11" fill="#34d399" stroke="white" stroke-width="0.8"/>
    <rect x="13" y="8" width="30" height="14" rx="3" fill="#34d399"/>
    <text x="28" y="19" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle">User 3</text>
  </g>

  <!-- Online avatars top-right -->
  <circle cx="466" cy="52" r="9" fill="#a78bfa"/>
  <text x="466" y="56" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle">H</text>
  <circle cx="482" cy="52" r="9" fill="#60a5fa"/>
  <text x="482" y="56" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle">U</text>
  <circle cx="450" cy="52" r="9" fill="#34d399"/>
  <text x="450" y="56" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle">U</text>
  <text x="434" y="56" font-family="sans-serif" font-size="9" fill="#9090aa">3 online</text>
</svg>
