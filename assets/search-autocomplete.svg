<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300">
  <!-- Background -->
  <rect width="500" height="300" rx="6" fill="#0f172a"/>

  <!-- Title bar -->
  <rect width="500" height="36" rx="6" fill="#1e293b"/>
  <rect y="30" width="500" height="6" fill="#1e293b"/>
  <circle cx="16" cy="18" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="18" r="5" fill="#febc2e"/>
  <circle cx="52" cy="18" r="5" fill="#28c840"/>
  <text x="250" y="23" font-family="monospace" font-size="11" fill="#64748b" text-anchor="middle">React Search Autocomplete</text>

  <!-- npm badge top right -->
  <rect x="410" y="8" width="78" height="20" rx="3" fill="#cb3837"/>
  <text x="449" y="22" font-family="monospace" font-size="9" fill="white" text-anchor="middle">npm package</text>

  <!-- Page content area -->
  <rect x="0" y="36" width="500" height="264" fill="#0f172a"/>

  <!-- Heading -->
  <text x="250" y="75" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f1f5f9" text-anchor="middle">Search anything...</text>

  <!-- Search input box -->
  <rect x="80" y="88" width="340" height="40" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Search icon -->
  <circle cx="106" cy="108" r="8" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <line x1="112" y1="114" x2="118" y2="120" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Input text with highlighted match -->
  <text x="128" y="113" font-family="monospace" font-size="13" fill="#94a3b8">re</text>
  <rect x="148" y="96" width="22" height="18" rx="2" fill="#3b82f6" opacity="0.3"/>
  <text x="148" y="113" font-family="monospace" font-size="13" fill="#60a5fa">ac</text>
  <text x="170" y="113" font-family="monospace" font-size="13" fill="#94a3b8">t</text>
  <!-- Cursor blink -->
  <rect x="184" y="97" width="2" height="16" fill="#3b82f6"/>

  <!-- Dropdown panel -->
  <rect x="80" y="130" width="340" height="148" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- Result item 1 - highlighted/hovered -->
  <rect x="80" y="130" width="340" height="38" rx="6" fill="#1d4ed8" opacity="0.25"/>
  <circle cx="106" cy="149" r="12" fill="#3b82f6" opacity="0.2"/>
  <text x="106" y="153" font-family="sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">⚛</text>
  <text x="128" y="146" font-family="sans-serif" font-size="12" fill="#f1f5f9">re</text>
  <text x="143" y="146" font-family="sans-serif" font-size="12" font-weight="bold" fill="#60a5fa">ac</text>
  <text x="158" y="146" font-family="sans-serif" font-size="12" fill="#f1f5f9">t-search-autocomplete</text>
  <text x="128" y="160" font-family="sans-serif" font-size="9" fill="#64748b">npm · 4.2k weekly downloads</text>

  <!-- Divider -->
  <line x1="96" y1="168" x2="404" y2="168" stroke="#334155" stroke-width="0.5"/>

  <!-- Result item 2 -->
  <circle cx="106" cy="184" r="12" fill="#8b5cf6" opacity="0.2"/>
  <text x="106" y="188" font-family="sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle">JS</text>
  <text x="128" y="181" font-family="sans-serif" font-size="12" fill="#94a3b8">re</text>
  <text x="143" y="181" font-family="sans-serif" font-size="12" font-weight="bold" fill="#a78bfa">ac</text>
  <text x="158" y="181" font-family="sans-serif" font-size="12" fill="#94a3b8">t-router-dom</text>
  <text x="128" y="195" font-family="sans-serif" font-size="9" fill="#64748b">npm · routing library</text>

  <!-- Divider -->
  <line x1="96" y1="202" x2="404" y2="202" stroke="#334155" stroke-width="0.5"/>

  <!-- Result item 3 -->
  <circle cx="106" cy="218" r="12" fill="#10b981" opacity="0.2"/>
  <text x="106" y="222" font-family="sans-serif" font-size="9" fill="#10b981" text-anchor="middle">TS</text>
  <text x="128" y="215" font-family="sans-serif" font-size="12" fill="#94a3b8">re</text>
  <text x="143" y="215" font-family="sans-serif" font-size="12" font-weight="bold" fill="#34d399">ac</text>
  <text x="158" y="215" font-family="sans-serif" font-size="12" fill="#94a3b8">t-query</text>
  <text x="128" y="229" font-family="sans-serif" font-size="9" fill="#64748b">npm · data fetching</text>

  <!-- Divider -->
  <line x1="96" y1="236" x2="404" y2="236" stroke="#334155" stroke-width="0.5"/>

  <!-- Result item 4 - faded -->
  <text x="128" y="252" font-family="sans-serif" font-size="12" fill="#64748b">re</text>
  <text x="143" y="252" font-family="sans-serif" font-size="12" font-weight="bold" fill="#475569">ac</text>
  <text x="158" y="252" font-family="sans-serif" font-size="12" fill="#64748b">t-hook-form</text>
  <text x="128" y="266" font-family="sans-serif" font-size="9" fill="#475569">npm · form validation</text>

  <!-- Debounce pill -->
  <rect x="340" y="94" width="72" height="18" rx="9" fill="#334155"/>
  <text x="376" y="106" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">debounce 300ms</text>
</svg>
