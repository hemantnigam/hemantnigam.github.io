  <text x="100" y="202" font-family="sans-serif" font-size="9" fill="#9ca3af">· 6 min read</text>
  <path d="M300,194 L300,208 L293,203 L286,208 L286,194 Z" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-linejoin="round"/>

