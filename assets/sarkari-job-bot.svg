  <rect x="372" y="236" width="104" height="30" rx="6" fill="#0d1f2e" stroke="#229ED9" stroke-width="1"/>
  <text x="380" y="248" font-family="sans-serif" font-size="8" font-weight="bold" fill="#229ED9">Premium &#9889;</text>
