<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300">
  <!-- Outer background -->
  <rect width="500" height="300" rx="6" fill="#0f1923"/>

  <!-- Title bar -->
  <rect width="500" height="36" rx="6" fill="#1a2535"/>
  <rect y="30" width="500" height="6" fill="#1a2535"/>
  <circle cx="16" cy="18" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="18" r="5" fill="#febc2e"/>
  <circle cx="52" cy="18" r="5" fill="#28c840"/>
  <text x="250" y="23" font-family="monospace" font-size="11" fill="#64748b" text-anchor="middle">Samvidhan Mitra · Flutter</text>

  <!-- Phone frame -->
  <rect x="148" y="44" width="204" height="248" rx="20" fill="#1c1c1e" stroke="#3a3a3c" stroke-width="2"/>
  <rect x="154" y="50" width="192" height="236" rx="16" fill="#F7FAFC" clip-path="url(#screen-clip2)"/>
  <defs>
    <clipPath id="screen-clip2">
      <rect x="154" y="50" width="192" height="236" rx="16"/>
    </clipPath>
  </defs>

  <!-- App header -->
  <rect x="154" y="50" width="192" height="46" fill="#1A365D"/>
  <circle cx="178" cy="73" r="12" fill="none" stroke="#FF9933" stroke-width="1.5"/>
  <circle cx="178" cy="73" r="3" fill="#FF9933"/>
  <line x1="178" y1="61" x2="178" y2="85" stroke="#FF9933" stroke-width="1" opacity="0.6"/>
  <line x1="166" y1="73" x2="190" y2="73" stroke="#FF9933" stroke-width="1" opacity="0.6"/>
  <line x1="169.5" y1="64.5" x2="186.5" y2="81.5" stroke="#FF9933" stroke-width="1" opacity="0.6"/>
  <line x1="186.5" y1="64.5" x2="169.5" y2="81.5" stroke="#FF9933" stroke-width="1" opacity="0.6"/>
  <text x="197" y="69" font-family="sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">Samvidhan</text>
  <text x="197" y="82" font-family="sans-serif" font-size="10" font-weight="bold" fill="#FF9933">Mitra</text>
  <circle cx="316" cy="66" r="3" fill="#138808"/>
  <text x="310" y="80" font-family="sans-serif" font-size="6" fill="rgba(255,255,255,0.5)" text-anchor="middle">EN</text>

  <!-- Chat area -->
  <rect x="154" y="96" width="192" height="148" fill="#F7FAFC"/>

  <!-- AI message bubble 1 -->
  <rect x="160" y="102" width="148" height="38" rx="10" fill="#1A365D"/>
  <text x="172" y="116" font-family="sans-serif" font-size="8" fill="white">Article 21 guarantees the</text>
  <text x="172" y="128" font-family="sans-serif" font-size="8" fill="white">Right to Life to every person.</text>
  <text x="172" y="138" font-family="sans-serif" font-size="7" fill="#FF9933">(Ref: Article 21)</text>

  <!-- User message bubble -->
  <rect x="192" y="148" width="148" height="26" rx="10" fill="#FF9933"/>
  <text x="204" y="158" font-family="sans-serif" font-size="8" fill="white">What is Right to Equality?</text>
  <text x="204" y="170" font-family="sans-serif" font-size="7" fill="rgba(255,255,255,0.8)">Articles 14-18</text>

  <!-- AI message bubble 2 -->
  <rect x="160" y="182" width="158" height="38" rx="10" fill="#1A365D"/>
  <text x="172" y="196" font-family="sans-serif" font-size="8" fill="white">It ensures every citizen is</text>
  <text x="172" y="208" font-family="sans-serif" font-size="8" fill="white">equal before the law.</text>
  <text x="172" y="218" font-family="sans-serif" font-size="7" fill="#FF9933">(Ref: Article 14)</text>

  <!-- Typing indicator -->
  <rect x="160" y="228" width="44" height="16" rx="8" fill="#e2e8f0"/>
  <circle cx="172" cy="236" r="3" fill="#94a3b8"/>
  <circle cx="182" cy="236" r="3" fill="#64748b"/>
  <circle cx="192" cy="236" r="3" fill="#94a3b8"/>

  <!-- Input bar -->
  <rect x="154" y="244" width="192" height="42" fill="#FFFFFF"/>
  <rect x="160" y="250" width="128" height="28" rx="14" fill="#EDF2F7"/>
  <rect x="294" y="250" width="28" height="28" rx="14" fill="#138808"/>
  <rect x="302" y="255" width="12" height="14" rx="6" fill="white"/>
  <path d="M299 265 Q299 272 308 272 Q317 272 317 265" stroke="white" stroke-width="1.5" fill="none"/>
  <line x1="308" y1="272" x2="308" y2="276" stroke="white" stroke-width="1.5"/>
  <line x1="304" y1="276" x2="312" y2="276" stroke="white" stroke-width="1.5"/>
  <text x="178" y="268" font-family="sans-serif" font-size="8" fill="#a0aec0">Ask about Constitution...</text>

  <!-- Home indicator -->
  <rect x="224" y="284" width="52" height="4" rx="2" fill="#3a3a3c"/>

  <!-- Left side info panel -->
  <rect x="10" y="50" width="128" height="200" rx="8" fill="#1a2535"/>
  <text x="74" y="72" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FF9933" text-anchor="middle">TECH STACK</text>
  <line x1="20" y1="78" x2="128" y2="78" stroke="#2d3f55" stroke-width="0.5"/>
  <rect x="18" y="86" width="50" height="18" rx="9" fill="#0d2137"/>
  <text x="43" y="99" font-family="sans-serif" font-size="8" fill="#60a5fa" text-anchor="middle">Flutter</text>
  <rect x="74" y="86" width="58" height="18" rx="9" fill="#0d2137"/>
  <text x="103" y="99" font-family="sans-serif" font-size="8" fill="#60a5fa" text-anchor="middle">Firebase</text>
  <rect x="18" y="110" width="36" height="18" rx="9" fill="#0d2137"/>
  <text x="36" y="123" font-family="sans-serif" font-size="8" fill="#34d399" text-anchor="middle">Hive</text>
  <rect x="60" y="110" width="72" height="18" rx="9" fill="#0d2137"/>
  <text x="96" y="123" font-family="sans-serif" font-size="8" fill="#34d399" text-anchor="middle">speech_to_text</text>
  <rect x="18" y="134" width="66" height="18" rx="9" fill="#0d2137"/>
  <text x="51" y="147" font-family="sans-serif" font-size="8" fill="#a78bfa" text-anchor="middle">flutter_tts</text>
  <rect x="90" y="134" width="48" height="18" rx="9" fill="#0d2137"/>
  <text x="114" y="147" font-family="sans-serif" font-size="8" fill="#a78bfa" text-anchor="middle">Provider</text>
  <line x1="20" y1="162" x2="128" y2="162" stroke="#2d3f55" stroke-width="0.5"/>
  <text x="74" y="177" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FF9933" text-anchor="middle">FEATURES</text>
  <circle cx="24" cy="192" r="3" fill="#FF9933"/>
  <text x="32" y="196" font-family="sans-serif" font-size="8" fill="#94a3b8">AI-powered Q&amp;A</text>
  <circle cx="24" cy="209" r="3" fill="#138808"/>
  <text x="32" y="213" font-family="sans-serif" font-size="8" fill="#94a3b8">Voice input &amp; output</text>
  <circle cx="24" cy="226" r="3" fill="#60a5fa"/>
  <text x="32" y="230" font-family="sans-serif" font-size="8" fill="#94a3b8">English &amp; Hindi</text>
  <circle cx="24" cy="243" r="3" fill="#a78bfa"/>
  <text x="32" y="247" font-family="sans-serif" font-size="8" fill="#94a3b8">Offline chat history</text>

  <!-- Right side panel -->
  <rect x="362" y="50" width="128" height="200" rx="8" fill="#1a2535"/>
  <rect x="362" y="50" width="128" height="8" rx="4" fill="#FF9933"/>
  <rect x="362" y="55" width="128" height="8" fill="#FFFFFF"/>
  <rect x="362" y="60" width="128" height="8" fill="#138808"/>
  <rect x="362" y="50" width="128" height="18" rx="4" fill="none"/>
  <text x="426" y="82" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FF9933" text-anchor="middle">ABOUT THE APP</text>
  <line x1="372" y1="88" x2="480" y2="88" stroke="#2d3f55" stroke-width="0.5"/>
  <text x="372" y="104" font-family="sans-serif" font-size="8" fill="#94a3b8">An AI chatbot that makes</text>
  <text x="372" y="118" font-family="sans-serif" font-size="8" fill="#94a3b8">the Indian Constitution</text>
  <text x="372" y="132" font-family="sans-serif" font-size="8" fill="#94a3b8">accessible to every citizen</text>
  <text x="372" y="146" font-family="sans-serif" font-size="8" fill="#94a3b8">in simple language.</text>
  <line x1="372" y1="158" x2="480" y2="158" stroke="#2d3f55" stroke-width="0.5"/>
  <text x="426" y="173" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FF9933" text-anchor="middle">LANGUAGES</text>
  <rect x="372" y="180" width="48" height="22" rx="4" fill="#1A365D" stroke="#FF9933" stroke-width="1"/>
  <text x="396" y="195" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle">English</text>
  <rect x="426" y="180" width="44" height="22" rx="4" fill="#1A365D" stroke="#138808" stroke-width="1"/>
  <text x="448" y="195" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle">&#2361;&#2367;&#2306;&#2342;&#2368;</text>
  <text x="426" y="228" font-family="sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Hinglish supported</text>
  <circle cx="426" cy="248" r="10" fill="none" stroke="#2d3f55" stroke-width="1.5"/>
  <circle cx="426" cy="248" r="3" fill="#2d3f55"/>
  <line x1="426" y1="238" x2="426" y2="258" stroke="#2d3f55" stroke-width="1"/>
  <line x1="416" y1="248" x2="436" y2="248" stroke="#2d3f55" stroke-width="1"/>
  <line x1="419" y1="241" x2="433" y2="255" stroke="#2d3f55" stroke-width="1"/>
  <line x1="433" y1="241" x2="419" y2="255" stroke="#2d3f55" stroke-width="1"/>
</svg>
